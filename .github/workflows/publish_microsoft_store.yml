name: Publish Microsoft Store
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  publish_windows_release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: microsoft/setup-msstore-cli@v1.3
      - run: msstore reconfigure --tenantId ${{ secrets.PARTNER_CENTER_TENANT_ID }} --sellerId ${{ secrets.PARTNER_CENTER_SELLER_ID }} --clientId ${{ secrets.PARTNER_CENTER_CLIENT_ID }} --clientSecret ${{ secrets.PARTNER_CENTER_CLIENT_SECRET }}

      - name: Install Dart dependencies
        run: flutter pub get

      - name: Generate Windows release notes metadata
        run: dart distribution/windows/generate_windows_release_notes.dart --version=${{ github.ref_name }}
        
      - name: Create MSIX package
        run: msstore package .

      - name: Update Microsoft Store submission metadata
        shell: pwsh
        env:
          MS_STORE_APP_ID: ${{ secrets.MS_STORE_APP_ID }}
        run: |
          $metadata = Get-Content -Raw .\distribution\windows\update_metadata.json
          msstore submission updateMetadata $env:MS_STORE_APP_ID "$metadata"

      - name: Publish MSIX to the Microsoft Store
        run: msstore publish --appId ${{ secrets.MS_STORE_APP_ID }} -v
