name: Flutter CI
on:
  push:
    branches:
      - main
  workflow_dispatch:

  pull_request:
    branches:
      - main

jobs:
  flutter_ci:
    name: Run flutter test and analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
      - run: flutter pub get
      - run: flutter analyze lib test
      - name: Check for untranslated messages
        run: |
          content=$(cat untranslated_messages.json)
          if [ "$content" = "{}" ]; then
            echo "✅ All translations are complete!"
          else
            echo "❌ Found untranslated messages:"
            cat untranslated_messages.json
            echo ""
            echo "Please add the missing translations to the corresponding .arb files"
            exit 1
          fi
      - name: Check license headers
        run: |
          MISSING_HEADERS=()
          while IFS= read -r -d '' file; do
            if ! grep -q "^// Copyright (C) 2026 Víctor Carreras" "$file"; then
              MISSING_HEADERS+=("$file")
            fi
          done < <(find lib test -name "*.dart" ! -name "*.g.dart" ! -name "*.freezed.dart" ! -name "*.mocks.dart" ! -name "app_localizations*.dart" -print0)

          if [ ${#MISSING_HEADERS[@]} -gt 0 ]; then
            echo "❌ The following files are missing the GPL-3.0 license header:"
            printf '%s\n' "${MISSING_HEADERS[@]}"
            exit 1
          else
            echo "✅ All files have the correct GPL-3.0 license header."
          fi
      - run: flutter test
